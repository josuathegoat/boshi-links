<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boshi.AI — AI Websites & Voice Agents for German Businesses</title>
  <meta name="description" content="AI websites & voice agents for German businesses. From zero to freedom." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0A0A0A;
      --yellow: #F5C518;
      --yellow-dim: rgba(245, 197, 24, 0.12);
      --yellow-glow: rgba(245, 197, 24, 0.35);
      --white: #FFFFFF;
      --muted: rgba(255, 255, 255, 0.4);
      --subtle: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.07);
      --grain-opacity: 0.035;
    }

    html, body {
      min-height: 100%;
      background-color: var(--bg);
      color: var(--white);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* -- VHS Grain overlay -- */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 100;
      pointer-events: none;
      opacity: var(--grain-opacity);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
    }

    /* -- Nature bleed background -- */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 90% 60% at 50% 0%, rgba(34, 60, 30, 0.18) 0%, transparent 70%),
        radial-gradient(ellipse 70% 50% at 20% 100%, rgba(34, 60, 30, 0.1) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(245, 197, 24, 0.04) 0%, transparent 50%);
      animation: bgBreath 10s ease-in-out infinite alternate;
    }

    @keyframes bgBreath {
      0%   { opacity: 0.6; }
      100% { opacity: 1; }
    }

    /* -- Scanlines -- */
    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 99;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0, 0, 0, 0.03) 2px,
        rgba(0, 0, 0, 0.03) 4px
      );
    }

    /* -- Page layout -- */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 20px 48px;
      animation: fadeIn 1s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* -- Avatar / Logo -- */
    .avatar {
      width: 104px;
      height: 104px;
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      box-shadow:
        0 0 40px rgba(245, 197, 24, 0.2),
        0 0 80px rgba(245, 197, 24, 0.08),
        0 0 0 1px rgba(255, 255, 255, 0.06);
      animation: avatarPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Fallback if no image */
    .avatar-fallback {
      width: 104px;
      height: 104px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a1a1a 0%, #111 100%);
      border: 2px solid rgba(245, 197, 24, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.6rem;
      font-weight: 800;
      color: var(--yellow);
      letter-spacing: -0.03em;
      box-shadow:
        0 0 40px rgba(245, 197, 24, 0.2),
        0 0 80px rgba(245, 197, 24, 0.08);
      animation: avatarPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      flex-shrink: 0;
    }

    @keyframes avatarPop {
      from { opacity: 0; transform: scale(0.6); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* -- Profile text -- */
    .profile {
      margin-top: 22px;
      text-align: center;
    }

    .profile-name {
      font-size: 1.65rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--white);
      line-height: 1.2;
    }

    .profile-tagline {
      margin-top: 10px;
      font-size: 0.92rem;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.55;
    }

    .profile-sub {
      margin-top: 6px;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--yellow);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      opacity: 0.8;
    }

    /* -- Divider -- */
    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--yellow), transparent);
      border-radius: 2px;
      margin: 28px 0;
      opacity: 0.5;
    }

    /* -- Links -- */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 14px 18px;
      background: var(--subtle);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--white);
      text-decoration: none;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition:
        transform 0.2s cubic-bezier(0.34, 1.4, 0.64, 1),
        box-shadow 0.25s ease,
        background 0.25s ease,
        border-color 0.25s ease;
      animation: linkSlide 0.5s ease both;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .link-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      opacity: 0;
      background: linear-gradient(135deg, rgba(245, 197, 24, 0.06) 0%, transparent 100%);
      transition: opacity 0.25s ease;
    }

    .link-btn:hover {
      transform: scale(1.02) translateY(-1px);
      background: rgba(245, 197, 24, 0.07);
      border-color: rgba(245, 197, 24, 0.3);
      box-shadow:
        0 0 24px rgba(245, 197, 24, 0.15),
        0 4px 24px rgba(0, 0, 0, 0.5);
    }

    .link-btn:hover::after {
      opacity: 1;
    }

    .link-btn:active {
      transform: scale(0.98);
    }

    /* Stagger */
    .link-btn:nth-child(1) { animation-delay: 0.12s; }
    .link-btn:nth-child(2) { animation-delay: 0.18s; }
    .link-btn:nth-child(3) { animation-delay: 0.24s; }
    .link-btn:nth-child(4) { animation-delay: 0.30s; }
    .link-btn:nth-child(5) { animation-delay: 0.36s; }
    .link-btn:nth-child(6) { animation-delay: 0.42s; }
    .link-btn:nth-child(7) { animation-delay: 0.48s; }

    @keyframes linkSlide {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .link-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: var(--yellow-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--yellow);
      transition: background 0.25s ease;
    }

    .link-btn:hover .link-icon {
      background: rgba(245, 197, 24, 0.2);
    }

    .link-icon svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .link-text {
      flex: 1;
      text-align: left;
      position: relative;
      z-index: 1;
    }

    .link-arrow {
      color: var(--muted);
      flex-shrink: 0;
      transition: color 0.2s ease, transform 0.2s ease;
      position: relative;
      z-index: 1;
    }

    .link-btn:hover .link-arrow {
      color: var(--yellow);
      transform: translateX(3px);
    }

    /* -- Footer -- */
    .footer {
      margin-top: 44px;
      text-align: center;
    }

    .footer-cta {
      font-size: 0.82rem;
      color: rgba(255, 255, 255, 0.5);
    }

    .footer-cta a {
      color: var(--yellow);
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .footer-cta a:hover {
      opacity: 0.75;
    }

    .footer-built {
      margin-top: 12px;
      font-size: 0.68rem;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 0.03em;
    }

    .footer-built a {
      color: rgba(255, 255, 255, 0.2);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-built a:hover {
      color: rgba(255, 255, 255, 0.45);
    }
  </style>
</head>
