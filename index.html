<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boshi.AI</title>
  <meta name="description" content="AI websites & voice agents for German businesses. From zero to freedom." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060606;
      --yellow: #E8B800;
      --yellow-hot: #F5C518;
      --yellow-dim: rgba(232, 184, 0, 0.08);
      --yellow-glow: rgba(232, 184, 0, 0.25);
      --forest: rgba(28, 48, 20, 0.4);
      --white: #F0EDE6;
      --gray: rgba(240, 237, 230, 0.35);
      --ghost: rgba(240, 237, 230, 0.08);
      --border: rgba(240, 237, 230, 0.06);
    }

    html { min-height: 100%; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--white);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ====== GRAIN ====== */
    .grain {
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.06;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      animation: grainDrift 0.5s steps(1) infinite;
    }

    @keyframes grainDrift {
      0%   { transform: translate(0, 0); }
      25%  { transform: translate(-2%, -1%); }
      50%  { transform: translate(1%, 2%); }
      75%  { transform: translate(-1%, -2%); }
      100% { transform: translate(2%, 1%); }
    }

    /* ====== GLOBE BACKGROUND ====== */
    .globe-wrap {
      position: fixed;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(95vw, 700px);
      height: min(95vw, 700px);
      z-index: 0;
      pointer-events: auto;
      opacity: 0;
      transition: opacity 1.5s ease;
      cursor: grab;
    }

    .globe-wrap:active {
      cursor: grabbing;
    }

    .globe-wrap.loaded {
      opacity: 0.7;
    }

    .globe-wrap canvas {
      width: 100% !important;
      height: 100% !important;
    }

    /* ====== VIGNETTE over globe ====== */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse 80% 70% at 50% 45%, transparent 0%, var(--bg) 100%);
    }

    /* ====== PAGE ====== */
    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px 40px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ====== LOGO ====== */
    .logo {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      overflow: hidden;
      border: 1.5px solid rgba(240, 237, 230, 0.1);
      box-shadow: 0 0 60px rgba(232, 184, 0, 0.12);
      animation: logoIn 1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @keyframes logoIn {
      from { opacity: 0; transform: scale(0.8); filter: blur(4px); }
      to   { opacity: 1; transform: scale(1); filter: blur(0); }
    }

    /* ====== IDENTITY ====== */
    .identity {
      margin-top: 24px;
      text-align: center;
      animation: textIn 0.8s ease both 0.2s;
    }

    @keyframes textIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .name {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--white);
    }

    .tagline {
      margin-top: 8px;
      font-size: 0.84rem;
      font-weight: 400;
      color: var(--gray);
      line-height: 1.6;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      padding: 5px 12px;
      background: var(--yellow-dim);
      border: 1px solid rgba(232, 184, 0, 0.15);
      border-radius: 100px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--yellow);
      letter-spacing: 0.02em;
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--yellow);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    /* ====== DIVIDER ====== */
    .rule {
      width: 32px;
      height: 1px;
      background: var(--yellow);
      opacity: 0.3;
      margin: 28px 0;
      animation: textIn 0.6s ease both 0.4s;
    }

    /* ====== LINKS ====== */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: textIn 0.7s ease both 0.5s;
    }

    .link {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 13px 16px;
      background: var(--ghost);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--white);
      text-decoration: none;
      font-family: inherit;
      font-size: 0.84rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .link:hover {
      background: rgba(232, 184, 0, 0.06);
      border-color: rgba(232, 184, 0, 0.2);
      box-shadow: 0 0 30px rgba(232, 184, 0, 0.08);
      transform: translateY(-1px);
    }

    .link:active {
      transform: translateY(0) scale(0.99);
    }

    .link-ico {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      background: rgba(240, 237, 230, 0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--gray);
      transition: color 0.2s, background 0.2s;
    }

    .link:hover .link-ico {
      color: var(--yellow);
      background: var(--yellow-dim);
    }

    .link-ico svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    .link-label { flex: 1; }

    .link-go {
      color: rgba(240, 237, 230, 0.15);
      transition: color 0.2s, transform 0.2s;
    }

    .link:hover .link-go {
      color: var(--yellow);
      transform: translateX(2px);
    }

    /* ====== FOOTER ====== */
    .foot {
      margin-top: 40px;
      text-align: center;
      animation: textIn 0.6s ease both 0.7s;
    }

    .foot-line {

      font-size: 0.62rem;
      color: rgba(240, 237, 230, 0.15);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
  </style>

  <!-- COBE globe — vanilla JS, no React needed -->
  <script type="module">
    import createGlobe from 'https://cdn.skypack.dev/cobe';

    const canvas = document.getElementById('globe-canvas');
    const container = document.getElementById('globe-container');

    if (canvas && container) {
      const width = container.offsetWidth;
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      let phi = 0;
      let pointerDown = null;
      let dragPhi = 0;
      let phiOffset = 0;
      let velocity = 0;

      // German cities — Boshi's market
      const markers = [
        { location: [52.0, 7.63], size: 0.08 },   // Munster (home)
        { location: [51.96, 7.63], size: 0.04 },   // Greven
        { location: [52.52, 13.405], size: 0.05 },  // Berlin
        { location: [48.137, 11.576], size: 0.05 },  // Munich
        { location: [50.937, 6.96], size: 0.05 },   // Cologne
        { location: [53.551, 9.993], size: 0.05 },   // Hamburg
        { location: [50.11, 8.68], size: 0.05 },    // Frankfurt
      ];

      // Drag interaction
      canvas.addEventListener('pointerdown', (e) => {
        pointerDown = e.clientX;
        canvas.style.cursor = 'grabbing';
      });

      window.addEventListener('pointermove', (e) => {
        if (pointerDown !== null) {
          const delta = e.clientX - pointerDown;
          dragPhi = delta / 200;
          velocity = delta * 0.0001;
        }
      });

      window.addEventListener('pointerup', () => {
        if (pointerDown !== null) {
          phiOffset += dragPhi;
          dragPhi = 0;
          pointerDown = null;
          canvas.style.cursor = 'grab';
        }
      });

      const globe = createGlobe(canvas, {
        devicePixelRatio: dpr,
        width: width * dpr,
        height: width * dpr,
        phi: 0,
        theta: 0.3,
        dark: 1,
        diffuse: 1.8,
        mapSamples: 20000,
        mapBrightness: 5,
        baseColor: [0.2, 0.2, 0.17],
        markerColor: [0.95, 0.75, 0],
        glowColor: [0.12, 0.11, 0.08],
        markers: markers,
        opacity: 0.9,
        onRender: (state) => {
          if (pointerDown === null) {
            phi += 0.003;
            velocity *= 0.95;
            phiOffset += velocity;
          }
          state.phi = phi + phiOffset + dragPhi;
        }
      });

      // Fade in
      setTimeout(() => container.classList.add('loaded'), 200);

      window.addEventListener('beforeunload', () => globe.destroy());
    }
  </script>
